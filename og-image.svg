<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0d2052"/>

  <!-- Flag stripe accent (USCIS-style top band) -->
  <rect x="0" y="0" width="1200" height="8" fill="#b22234"/>
  <rect x="0" y="8" width="1200" height="8" fill="#ffffff"/>
  <rect x="0" y="16" width="1200" height="8" fill="#0d2052"/>

  <!-- Main title -->
  <text x="600" y="240"
        text-anchor="middle"
        font-family="'Playfair Display', Georgia, serif"
        font-weight="900"
        font-size="68"
        fill="#ffffff">
    U.S. Citizenship Civics Test
  </text>

  <!-- Subtitle -->
  <text x="600" y="310"
        text-anchor="middle"
        font-family="'Source Serif 4', Georgia, serif"
        font-weight="400"
        font-style="italic"
        font-size="38"
        fill="#cfd8f5">
    Free Practice — 14 Languages
  </text>

  <!-- Flags row -->
  <text x="600" y="430"
        text-anchor="middle"
        font-family="-apple-system, 'Segoe UI Emoji', 'Noto Color Emoji', sans-serif"
        font-size="76">
    🇺🇸 🇻🇳 🇲🇽 🇨🇳 🇵🇭 🇰🇷
  </text>

  <!-- Badge -->
  <g transform="translate(600 530)">
    <rect x="-310" y="-32" width="620" height="64" rx="32"
          fill="#ffffff" fill-opacity="0.10"
          stroke="#ffffff" stroke-opacity="0.35" stroke-width="1.5"/>
    <text x="0" y="9"
          text-anchor="middle"
          font-family="'Source Serif 4', Georgia, serif"
          font-weight="600"
          font-size="24"
          fill="#ffffff"
          letter-spacing="1">
      100% Free · No Account · No Ads
    </text>
  </g>

  <!-- Brand wordmark, bottom-right -->
  <text x="1150" y="610"
        text-anchor="end"
        font-family="'Playfair Display', Georgia, serif"
        font-weight="700"
        font-size="22"
        fill="#ffffff"
        fill-opacity="0.7">
    formN400.org
  </text>
</svg>
